services:
  - type: web
    name: personal-portfolio
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_SESSION_SECRET
        generateValue: true
      - key: ADMIN_SESSION_TTL_MS
        value: "43200000"
      - key: QQ_SMTP_HOST
        value: smtp.qq.com
      - key: QQ_SMTP_PORT
        value: "465"
      - key: QQ_SMTP_USER
        sync: false
      - key: QQ_SMTP_PASS
        sync: false
      - key: CONTACT_TO
        sync: false
